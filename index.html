<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taba — sua aldeia de Encantados</title>
<style>
  /* Tema redesign (Taba_Game_UI.pptx) · fontes Cinzel (display) + Asap (corpo) · degradam offline */
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Asap:wght@400;500;600&display=swap');
  :root{--azul:#0B1E3F;--ambar:#D4A24C;--branco:#F5F2EA;--mata:#2E5d3a;--hp:#c0392b;
    --display:'Cinzel',Georgia,serif;--corpo:'Asap','Segoe UI',system-ui,sans-serif;
    --painel:#13100c;--painel2:#1c1813;--moldura:#3a2e1c;--moldura2:#6b5430;
    --c-comum:#b9c4d0;--c-incomum:#5fbf6a;--c-raro:#4a90e2;--c-lendario:#c77dff;--c-encantado:#ffb84d;
    --c-ancestral:#3fd6c0;--c-sagrado:#6ad3ff;--c-celestial:#9fb0ff;--c-divino:#ff9ff3;--c-primordial:#ffe06a;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:var(--corpo)}
  body{background:radial-gradient(circle at 50% -5%,#3a2418,#1a1410 55%,#0a0807);color:var(--branco);
       min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px}
  h1{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:2px;color:var(--ambar);text-align:center;text-shadow:0 2px 8px #000a}
  h1 small{display:block;font-size:11px;color:#9fb4cf;font-weight:400}
  .topbar{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;background:linear-gradient(#221b12,#161109);
          border:1px solid var(--moldura2);box-shadow:0 2px 10px #0008,inset 0 1px 0 #ffffff10;border-radius:10px;padding:7px 14px}
  .stat{font-size:13px}.stat b{color:var(--ambar);font-variant-numeric:tabular-nums}
  .wrap{width:min(720px,97vw);display:flex;flex-direction:column;gap:10px}
  .arena{position:relative;height:200px;border-radius:12px;overflow:hidden;border:1px solid #ffffff1f;
         background:linear-gradient(#1b3a23,#24502e 70%,#163a52);box-shadow:0 8px 30px #0008}
  .ground{position:absolute;bottom:0;width:100%;height:46px;background:linear-gradient(transparent,#000000aa)}
  .node-label{position:absolute;top:8px;left:10px;font-size:12px;color:#cfe0d6;background:#00000055;padding:2px 8px;border-radius:6px}
  .stagebar{position:absolute;top:30px;left:10px;right:10px;height:13px;background:#00000066;border-radius:7px;overflow:hidden;border:1px solid #0d2414}
  .stagebar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#D4A24C,#ffcf7a);transition:width .25s}
  .stagebar.boss i{background:linear-gradient(90deg,#9a2a2a,#e25555)}
  .stagebar span{position:absolute;left:0;right:0;top:0;text-align:center;font-size:9px;line-height:13px;color:#fff;text-shadow:0 1px 2px #000}
  .progbtn{position:absolute;top:46px;right:10px;font-size:11px;padding:3px 9px;background:#0d2236;border:1px solid #2a4a66;color:#cfe0d6;border-radius:6px;cursor:pointer;z-index:4}
  .progbtn:hover{border-color:var(--ambar)}
  .fighter{position:absolute;bottom:12px;text-align:center;transition:transform .16s ease-out}
  .fighter.foe .spr img{transform:scaleX(-1)}  /* inimigos encaram os heróis (viram pra esquerda) */
  .fighter.hflip .spr img{transform:scaleX(-1)} /* heróis que nasceram virados p/ esquerda → encaram a direita */
  @keyframes walkIn{from{transform:translateX(130px)}to{transform:translateX(0)}}
  .fighter.walkin{animation:walkIn .5s ease-out}  /* inimigo entra caminhando da direita */
  /* === marcha entre waves (câmera-scroll) === */
  @keyframes marchScroll{0%{background-position:50% 100%}100%{background-position:41% 100%}}  /* mundo desliza p/ esquerda = avanço */
  .arena.marching{animation:marchScroll .82s ease-in-out}
  @keyframes runBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .arena.marching .fighter:not(.foe) .spr{animation:runBob .25s ease-in-out infinite}  /* heróis "correndo" */
  .fighter::after{content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:40px;height:10px;
    background:radial-gradient(ellipse at center,#000c,#0007 45%,transparent 72%);border-radius:50%;z-index:-1;pointer-events:none}
  .fighter .spr{font-size:34px;filter:drop-shadow(0 4px 3px #0008);transform-origin:50% 100%;animation:breathe 3.4s ease-in-out infinite}  /* respiração sutil ancorada nos pés (planta no chão, não flutua) */
  .fighter:nth-child(2) .spr{animation-delay:.6s}.fighter:nth-child(3) .spr{animation-delay:1.2s}
  .fighter:nth-child(2) .spr{animation-delay:.3s}.fighter:nth-child(3) .spr{animation-delay:.6s}
  @keyframes breathe{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.02) scaleX(.99)}}
  .fighter.hit .spr{transform:translateX(6px) scale(.92);animation:none}
  /* Arte: sprite por <img> quando existir; senão o heroIcon() cai pro emoji via onerror */
  .spr-img{width:22px;height:22px;vertical-align:middle;object-fit:contain;border-radius:4px}
  .spr-img.big{width:56px;height:56px;border-radius:8px;filter:drop-shadow(0 3px 2px #0007)}
  .bar{width:50px;height:6px;background:#00000066;border-radius:3px;margin:2px auto 0;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--hp);width:100%}
  .name{font-size:10px;color:#cfe0d6}
  .nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .nav button{flex:1;min-width:84px;background:linear-gradient(#2a2014,#1a140c);color:#e8d9b8;border:1px solid var(--moldura)}
  .nav button.active{background:linear-gradient(var(--ambar),#b9863a);color:#1a1206;border-color:#f0c068;box-shadow:0 0 8px #d4a24c66}
  .panel{background:linear-gradient(#15110b,#100c07);border:1px solid var(--moldura2);border-radius:10px;padding:12px;min-height:150px;
         box-shadow:0 6px 24px #0009,inset 0 0 0 1px #00000055}
  .panel h2{font-family:var(--display);font-weight:700;font-size:15px;color:var(--ambar);margin-bottom:8px;letter-spacing:1.5px;
            border-bottom:1px solid var(--moldura);padding-bottom:6px;text-shadow:0 1px 3px #000}
  button{background:var(--ambar);color:#1a1206;border:0;border-radius:7px;padding:7px 11px;font-weight:700;font-size:12px;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}button:disabled{opacity:.4;cursor:not-allowed}
  .cards{display:flex;gap:10px;flex-wrap:wrap}
  .card{flex:1;min-width:170px;background:linear-gradient(#1c1610,#14100a);border:1px solid var(--moldura);border-radius:9px;padding:9px}
  .card h3{font-family:var(--display);font-weight:600;font-size:13px;color:var(--ambar);display:flex;justify-content:space-between;align-items:center}
  .card p{font-size:11px;color:#9fb4cf;margin:3px 0}
  .gearrow{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:5px}
  .gslot{flex:1;aspect-ratio:1;background:#06142b;border:1px dashed #ffffff22;border-radius:6px;display:grid;place-items:center;font-size:16px;position:relative;cursor:pointer}
  .gslot.fill{border-style:solid}
  .gslot small{position:absolute;top:1px;left:3px;font-size:8px;color:#7f93ad}
  .upg{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:6px 0;font-size:12px;background:#191309;border:1px solid #2a2014;border-radius:8px;padding:7px 9px}
  .regtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .regtabs button{font-size:11px;padding:5px 9px;background:#13294d;color:#cfe0d6;border:1px solid #ffffff14}
  .regtabs button.sel{background:var(--mata);color:#fff;border-color:#4f8}
  .map{display:flex;flex-direction:column-reverse;gap:6px;align-items:center}
  .node{display:flex;align-items:center;gap:10px;width:240px;background:#0a1c3a;border:1px solid #ffffff14;border-radius:9px;padding:7px 11px;cursor:pointer;transition:.12s}
  .node:hover{border-color:var(--ambar)}.node.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
  .node.current{border-color:var(--ambar);box-shadow:0 0 0 2px #d4a24c66 inset}
  .node .dot{width:22px;height:22px;border-radius:50%;background:#1b3a52;display:grid;place-items:center;font-size:12px}
  .node.cleared .dot{background:var(--mata)}.node small{color:#9fb4cf;font-size:10px}
  .stabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;align-items:center}
  .stab{display:flex;align-items:center;gap:5px;background:#13294d;border:1px solid #ffffff1f;border-radius:7px 7px 0 0;
        padding:5px 9px;font-size:12px;cursor:grab;user-select:none}
  .stab.sel{background:var(--ambar);color:#1a1206;border-color:var(--ambar);font-weight:700}
  .stab.drag{opacity:.4}.stab.over{box-shadow:0 0 0 2px #ffd56b inset}
  .stab .grip{color:#7f93ad;font-size:11px}
  .invgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
  .slot{aspect-ratio:1;background:#0a1c3a;border:1px solid #ffffff12;border-radius:6px;display:grid;place-items:center;font-size:18px;position:relative;cursor:pointer}
  .slot.sel{outline:2px solid var(--ambar)}
  .slot.r-comum{border-color:var(--c-comum)}.slot.r-incomum{border-color:var(--c-incomum)}
  .slot.r-raro{border-color:var(--c-raro)}.slot.r-lendario{border-color:var(--c-lendario)}
  .slot.r-encantado{border-color:var(--c-encantado);box-shadow:0 0 6px #ffb84d66}
  .slot.r-ancestral{border-color:var(--c-ancestral);box-shadow:0 0 7px #3fd6c077}
  .slot.r-sagrado{border-color:var(--c-sagrado);box-shadow:0 0 8px #6ad3ff88}
  .slot.r-celestial{border-color:var(--c-celestial);box-shadow:0 0 9px #9fb0ffaa}
  .slot.r-divino{border-color:var(--c-divino);box-shadow:0 0 11px #ff9ff3aa}
  .slot.r-primordial{border-color:var(--c-primordial);box-shadow:0 0 14px #ffe06a;animation:primGlow 1.8s ease-in-out infinite}
  @keyframes primGlow{0%,100%{box-shadow:0 0 10px #ffe06a99}50%{box-shadow:0 0 18px #ffe06a}}
  .slot .pw{position:absolute;bottom:1px;right:3px;font-size:9px;color:#cfe0d6}
  .actbar{margin-top:9px;background:#0a1c3a;border:1px solid #ffffff1a;border-radius:8px;padding:9px;font-size:12px}
  .actbar .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px}
  #log{height:74px;overflow:auto;font-size:11px;color:#a9c0d8;line-height:1.6;margin-top:8px}
  #log .gold{color:var(--ambar)}#log .crit{color:#ffd56b}#log .sys{color:#7fd1a0}#log .loot{color:#c77dff}
  #log .lore{color:#d9b87a;font-style:italic;opacity:.92}
  .float{position:absolute;font-size:12px;font-weight:700;color:var(--ambar);pointer-events:none;animation:rise .8s ease-out forwards}
  @keyframes rise{to{transform:translateY(-26px);opacity:0}}
  /* Leva 3 · animação de combate */
  .proj{position:absolute;font-size:17px;pointer-events:none;z-index:5;transition:left .16s linear,top .16s linear,transform .16s}
  .aoe{position:absolute;border-radius:50%;pointer-events:none;z-index:4;animation:aoeFx .5s ease-out forwards}
  @keyframes aoeFx{0%{transform:scale(.2);opacity:.85}100%{transform:scale(2.4);opacity:0}}
  .heal{position:absolute;font-size:15px;color:#7fd1a0;font-weight:700;pointer-events:none;animation:rise .8s ease-out forwards}
  .chestdrop{position:absolute;font-size:20px;pointer-events:none;z-index:6;animation:chestFall 1s ease-in forwards}
  @keyframes chestFall{0%{transform:translateY(-34px) scale(.5);opacity:0}30%{opacity:1}70%{transform:translateY(2px) scale(1.05)}100%{transform:translateY(-10px) scale(1);opacity:0}}
  .stacks{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:9px;color:#ff8c5a;font-weight:700;text-shadow:0 1px 2px #000;white-space:nowrap}
  .casting .spr{animation:cast .35s ease-out}
  @keyframes cast{0%{transform:scale(1)}40%{transform:scale(1.22) translateY(-3px)}100%{transform:scale(1)}}
  /* FX procedural extra (impacto/tremor/telegrafo/morte) */
  .spark{position:absolute;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:7;box-shadow:0 0 5px currentColor;animation:sparkFly .33s ease-out forwards}
  @keyframes sparkFly{from{opacity:1;transform:translate(0,0) scale(1.1)}to{opacity:0;transform:translate(var(--dx,8px),var(--dy,8px)) scale(.2)}}
  @keyframes shake2{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-1px)}80%{transform:translate(3px,1px)}}
  .arena.shake{animation:shake2 .26s}
  .squash .spr,.spr.squashfx{animation:squashFx .18s ease-out}
  @keyframes squashFx{0%{transform:scale(1,1)}30%{transform:scale(1.18,.82)}60%{transform:scale(.94,1.06)}100%{transform:scale(1,1)}}
  .telegraph{position:absolute;border:2px solid #e25555;border-radius:50%;pointer-events:none;z-index:6;box-shadow:0 0 10px #e2555588;animation:teleFx .6s ease-out forwards}
  @keyframes teleFx{from{transform:scale(.3);opacity:.95}to{transform:scale(1.9);opacity:0}}
  .callout{position:absolute;font-family:var(--display);font-size:12px;font-weight:800;color:#ffe6a6;white-space:nowrap;text-shadow:0 0 8px #000,0 0 10px #d4a24c;pointer-events:none;z-index:8;animation:calloutFx 1s ease-out forwards}
  @keyframes calloutFx{0%{opacity:0;transform:translateY(4px) scale(.8)}25%{opacity:1;transform:translateY(-6px) scale(1.1)}100%{opacity:0;transform:translateY(-24px) scale(1)}}
  /* Narrativa · modal de escolha / final (Onda 3) */
  .ovl{position:fixed;inset:0;background:#000a;display:grid;place-items:center;z-index:50;padding:16px}
  .ovlbox{background:linear-gradient(#1a1206,#0f0b06);border:2px solid var(--ambar);border-radius:14px;max-width:480px;width:100%;padding:20px;box-shadow:0 10px 40px #000c;text-align:center}
  .ovlbox h2{font-family:var(--display);color:#ffe06a;margin:6px 0}
  .ovlsub{font-size:11px;letter-spacing:1px;color:#b98b4a;text-transform:uppercase}
  .ovltext{font-size:13px;line-height:1.5;color:#e8d9b8;margin:10px 0 14px}
  .ovlopts{display:flex;flex-direction:column;gap:8px}
  .ovlopts button{display:flex;flex-direction:column;align-items:flex-start;text-align:left;background:linear-gradient(#2a2014,#1a140c);border:1px solid var(--moldura);color:#e8d9b8;padding:10px 12px;border-radius:8px;cursor:pointer}
  .ovlopts button:hover{border-color:var(--ambar);box-shadow:0 0 8px #d4a24c44}
  .ovlopts button small{color:#9a8a6a;font-size:10px;margin-top:2px}
  .ovlbox.ending{border-color:#f0c068}
  .banner{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:8}
  .banner span{font-family:var(--display);font-weight:800;font-size:25px;letter-spacing:2px;color:#ffe06a;
    text-shadow:0 2px 0 #000,0 0 18px #ffae3c;animation:bannerFx 1.3s ease-out forwards;text-align:center}
  @keyframes bannerFx{0%{transform:scale(.6);opacity:0}18%{transform:scale(1.05);opacity:1}78%{transform:scale(1.05);opacity:1}100%{transform:scale(1.18);opacity:0}}
  .foot{font-size:10px;color:#5f7596;text-align:center}.muted{color:#7f93ad;font-size:11px}
  /* ===== Mobile-first: nav vira barra inferior fixa, grids menores, touch maior ===== */
  @media(max-width:560px){
    body{padding:7px 6px 66px}            /* espaço pro nav inferior */
    h1{font-size:16px}h1 small{font-size:10px}
    .topbar{gap:9px;padding:6px 9px}.stat{font-size:12px}
    .arena{height:168px}
    .invgrid{grid-template-columns:repeat(6,1fr)}
    .card{min-width:100%}.node{width:100%}
    .nav{position:fixed;left:0;right:0;bottom:0;z-index:30;margin:0;background:#081830f2;
         border-top:1px solid #ffffff22;gap:2px;padding:5px 4px;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start}
    .nav button{min-width:0;flex:1 0 auto;font-size:10px;padding:8px 7px;border-radius:8px}
    button{padding:9px 12px}              /* alvos de toque maiores */
    .panel{clip-path:none}                /* mobile: sem chanfro p/ evitar corte de toque */
  }
  /* ===== Molduras Rúnicas · redesign fiel ao Taba_Game_UI.pptx (Onda 1b) ===== */
  .panel{position:relative;
    background:
      radial-gradient(130% 90% at 50% 0%,#221a10,#15110b 58%,#0f0b07),
      repeating-linear-gradient(0deg,#ffffff04 0 1px,transparent 1px 5px);
    border:1px solid var(--moldura2);
    clip-path:polygon(15px 0,calc(100% - 15px) 0,100% 15px,100% calc(100% - 15px),calc(100% - 15px) 100%,15px 100%,0 calc(100% - 15px),0 15px);
    box-shadow:0 8px 28px #000a,inset 0 0 30px #00000088;}
  .panel::before{content:'';position:absolute;inset:6px;pointer-events:none;border:1px solid #d4a24c40;
    clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px),0 10px);}
  /* cabeçalho gravado — placa âmbar com flancos rúnicos ◈ */
  .panel>h2:first-child{font-family:var(--display);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
    color:#ffe6a6;text-align:center;font-size:16px;text-shadow:0 1px 0 #000,0 0 12px #d4a24c55;
    padding:6px 0 10px;margin:-2px 0 12px;border-bottom:1px solid #00000066;box-shadow:0 1px 0 #d4a24c22}
  .panel>h2:first-child::before,.panel>h2:first-child::after{content:'◈';color:var(--ambar);font-size:11px;margin:0 10px;opacity:.85;vertical-align:middle}
  .panel h3{font-family:var(--display);color:#e8c886;letter-spacing:.5px;border-left:3px solid var(--ambar);padding-left:8px;margin:6px 0}
  /* cards entalhados */
  .card{position:relative;clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);
    box-shadow:inset 0 0 0 1px #ffffff0a,0 4px 14px #0007}
  /* nav e topbar em pedra entalhada */
  .nav button{font-family:var(--display);font-size:12px;letter-spacing:.3px;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
  .nav button.active{box-shadow:0 0 12px #d4a24c88,inset 0 0 0 1px #ffe6a6}
  .topbar{clip-path:polygon(11px 0,calc(100% - 11px) 0,100% 11px,100% calc(100% - 11px),calc(100% - 11px) 100%,11px 100%,0 calc(100% - 11px),0 11px)}
</style>
</head>
<body>
  <h1>TABA <small>a resistência dos povos originários — roda na sua aba, sem instalar</small></h1>
  <div class="topbar">
    <div class="stat">🪙 <b id="gold">0</b></div>
    <div class="stat">🌎 <b id="region">Mata Atlântica</b></div>
    <div class="stat">📍 <b id="stageLbl">1-1</b></div>
    <div class="stat">⚔️ <b id="kills">0</b></div>
    <div class="stat">🎒 <b id="invc">0</b>/<span id="invcap">48</span></div>
  </div>
  <div class="wrap">
    <div class="arena" id="arena"><div class="ground"></div><div class="node-label" id="nodeLabel"></div><div class="stagebar" id="stageBar"><i id="stageProg"></i><span id="stageTxt"></span></div><button class="progbtn" id="progBtn">▶ Auto</button></div>
    <div class="nav">
      <button data-p="aldeia" class="active">⚔️ Aldeia</button>
      <button data-p="formacao">🪶 Formação</button>
      <button data-p="skills">📜 Skills</button>
      <button data-p="inv">🎒 Inventário</button>
      <button data-p="bau">📦 Baú</button>
      <button data-p="cube">🔮 Cubo</button>
      <button data-p="runas">🔰 Runas</button>
      <button data-p="portal">🗺️ Portal</button>
      <button data-p="pets">🐾 Pets</button>
      <button data-p="deuses">✨ Deuses</button>
      <button data-p="mercado">💰 Mercado</button>
      <button data-p="cronica">📜 Crônica</button>
    </div>
    <div class="panel" id="panel"></div>
    <div class="foot">Protótipo M2 · Pindorama · Dr. André William Feix · OAB/SC 56.213 · save local no seu navegador</div>
  </div>

<script>
// ============ TABA · protótipo idle M2 ============
// A ameaça é a colonização. O inimigo é referenciado pela INDUMENTÁRIA/EQUIPAMENTO de época, não por etnia.
// REGIÕES = CAPÍTULOS CRONOLÓGICOS da invasão (litoral 1500 → interior/ouro ~1700). Ver docs/ESTUDO_HISTORICO_LORE_E_ROTEIRO.md
const REGIONS = [
  {name:"Mata Atlântica", ch:"I",  title:"A Primeira Vela",      period:"1500–1549",

  for(const r of RUNES){const l=S.runes[r.k]||0;if(l)b[r.stat]+=r.per*l;}RB=b;invalidateStats();}

  log(`🔰 ${r.n} → Nv.${l+1}.`,'sys');updateTop();renderPanel();save();}

function cubeGainXp(n){if((S.cubeLevel||1)>=100)return;S.cubeXp=(S.cubeXp||0)+n;

let skillTimers={};
function fireSkills(h,i,dt){const sk=S.heroSkills[h.key]||{};
  SKILLS.filter(s=>s.h===h.key&&s.active&&!s.party&&(sk[s.id]||0)>0).forEach(s=>{
    const key=h.key+s.id,rank=sk[s.id];skillTimers[key]=(skillTimers[key]||0)-dt;
    if(skillTimers[key]<=0&&enemy&&h.curHp>0){skillTimers[key]=Math.max(2,5-rank*0.3);castFx('h'+i);
      skillCallout('h'+i,s.n,s.stat==='hpRegen'?'#7fd1a0':(s.aoe?'#ff6a3d':'#ffd56b'));
      if(s.stat==='hpRegen'){healFx();party.forEach(p=>{if(p.curHp>0)p.curHp=Math.min(effHp(p),p.curHp+effHp(p)*0.06*rank);});}
      else{const burst=Math.floor(heroStats(h).atkDmg*(0.6+rank*0.7));
        projectile('h'+i,HERO_PROJ[h.key]||'✶',1);if(s.aoe)aoePulse(h.key==='feiticeiro'?'#ff6a3d':'#9fe0ff');
        const b2=Math.max(1,Math.floor(burst*mobDef(enemy.def||0)));enemy.hp-=b2;floatTxt(355,'✦'+b2,'#ffd56b');flash('enemy');hitSpark('enemy',s.aoe?(h.key==='feiticeiro'?'#ff6a3d':'#9fe0ff'):'#ffd56b');
        if(s.aoe)waveQueue.forEach(m=>{m.hp-=Math.floor(b2*0.5);});if(enemy.hp<=0)killEnemy();}}});}

// Movimentação: avança ao atacar e recua à formação (a .fighter tem transition:transform). Velocidade já dita a frequência (cd).
function lunge(id,dx){const el=document.getElementById(id);if(!el)return;const hold=Math.abs(dx)>40?210:120; // avanço grande (melee) segura mais p/ completar o passo
  el.style.transform=`translateX(${dx}px)`;setTimeout(()=>{if(el&&el.isConnected)el.style.transform='translateX(0)';},hold);}
function updateStageBar(){const bar=document.getElementById('stageBar'),pi=document.getElementById('stageProg'),tx=document.getElementById('stageTxt');if(!bar||!pi||!tx)return;
  if(isBossStage(S.stage)){bar.classList.add('boss');pi.style.width='100%';tx.textContent='⚔️ CHEFE — '+REGIONS[S.region].boss+' (luta única)';}
  else{bar.classList.remove('boss');const prog=Math.min(killsOnNode,STAGE_QUOTA);pi.style.width=(prog/STAGE_QUOTA*100)+'%';
    tx.textContent=`${prog}/${STAGE_QUOTA} ${isCleared(S.region,S.stage)?'· farmando':'até concluir a fase'}`;}}
function updateProgBtn(){const b=document.getElementById('progBtn');if(b)b.textContent=S.autoProg?'▶ Auto':'🔒 Farm';}
let last=performance.now();
function tick(now){const dt=Math.min((now-last)/1000,0.25);last=now;
  if(narrativePause){requestAnimationFrame(tick);return;}   // pausa durante dilema/final
  if(now<hitStopUntil){renderBars();requestAnimationFrame(tick);return;}   // hit-stop: congela o avanço (peso no impacto)
  if(!enemy){   // entre waves: heróis marcham (mundo rola), depois a próxima leva entra
    if(marchUntil===0)startMarch(now);
    else if(now>=marchUntil){endMarch();marchUntil=0;spawnEnemy();}
    renderBars();requestAnimationFrame(tick);return;}
  party.forEach((h,i)=>{if(h.curHp<=0)return;const st=heroStats(h);h.cd-=dt;
    if(st.hpRegen)h.curHp=Math.min(st.maxHp,h.curHp+st.hpRegen*dt);
    if(h.cd<=0&&enemy){h.cd=1/st.atkSpeed;const melee=(HERO_RANGE[h.key]??0.5)<=0.3;
      lunge('h'+i,melee?Math.round(arena.clientWidth*0.06):14);attackFrame(i,h);h._atks=(h._atks||0)+1;  // melee já está colado · golpe curto de clash
      let rageMul=1;if(h.key==='lanceiro'){h._rage=Math.min(10,(h._rage||0)+1);rageMul=1+h._rage*0.03;
        const sb=document.getElementById('st'+i);if(sb)sb.textContent='🔥'+h._rage;}
      let dmg=Math.floor(st.atkDmg*(0.9+Math.random()*0.3)*rageMul);
      const crit=Math.random()<st.critChance;if(crit)dmg=Math.floor(dmg*(1+st.critDmg));
      if(!melee)projectile('h'+i,HERO_PROJ[h.key]||'✶');
      const cast=h._atks%6===0;
      if(cast){castFx('h'+i);dmg=Math.floor(dmg*2.2);
        if(h.key==='feiticeiro'){projectile('h'+i,'☄️',1);aoePulse('#ff6a3d');}
        else if(h.key==='arqueiro'){projectile('h'+i,'🏹',1);aoePulse('#9fe0ff');}
        else if(h.key==='cacador'){projectile('h'+i,'💥',1);aoePulse('#aaffcc');}
        else if(h.key==='paje'){healFx();party.forEach(p=>{if(p.curHp>0)p.curHp=Math.min(effHp(p),p.curHp+effHp(p)*0.08);});}
        else aoePulse('#ffd56b');
        floatTxt(360,'✦'+dmg,'#ffd56b');}
      dmg=Math.max(1,Math.floor(dmg*mobDef(enemy.def||0)));enemy.hp-=dmg;flash('enemy');hitSpark('enemy',crit?'#ffd56b':'#ffffff');squash('enemy');if(crit){screenShake();hitStop(50);}
      if(!cast&&Math.random()<0.5)floatTxt(360+Math.random()*60,'-'+dmg,crit?'#ffd56b':null);
      if(enemy.hp<=0)killEnemy();}
    fireSkills(h,i,dt);});
  // ataque SIMULTÂNEO: o da frente (100%) + toda a fila da leva (60%, menos engajados), cada um na própria velocidade
  if(enemy){enemy.cd-=dt;if(enemy.cd<=0){enemy.cd=1.1/(enemy.spd||1);enemyAttack(enemy,'enemy',1);}}
  waveQueue.forEach((m,qi)=>{if(m.hp<=0)return;m.cd=(m.cd||0)-dt;if(m.cd<=0){m.cd=1.3/(m.spd||1);enemyAttack(m,'wq'+qi,0.6);}});
  renderBars();requestAnimationFrame(tick);}
function enemyAttack(m,dom,mult){mult=mult||1;m._atks=(m._atks||0)+1;
  const special=(m.boss?m._atks%4===0:m._atks%8===0),tgt=party.find(h=>h.curHp>0);if(!tgt)return;
  const idx=party.indexOf(tgt),st=heroStats(tgt);
  let d2=m.atk*mult*(special?2.6:1)*(1-st.armor/(st.armor+120));
  const el=m.elem;if(el&&el!=='none'){const res=Math.min(0.8,st['res'+el.charAt(0).toUpperCase()+el.slice(1)]||0);d2*=(1-0.5*res);}
  const dmgTaken=Math.max(1,Math.floor(d2));
  if(special&&dom==='enemy'){telegraph(dom);castFx(dom);aoePulse(ELEM_COLOR[m.elem]||'#e25555');screenShake();hitStop(60);floatTxt(80,'⚠ habilidade!','#e25555');}
  const ranged=(m.rng||0)>=0.5;
  if(ranged)enemyProjectile(dom,'h'+idx,m.proj);          // ranged: atira do fundo, não avança
  else if(dom==='enemy')lunge(dom,special?-44:-28);        // melee: clash corpo-a-corpo com o tank
  if(dom==='enemy')enemyAttackFrame();
  tgt.curHp-=dmgTaken;flash('h'+idx);hurtFrame(idx,tgt);hitSpark('h'+idx,ELEM_COLOR[m.elem]||'#e25555');squash('h'+idx);
  if(tgt.curHp<=0)log(`${tgt.name} caiu...`,'crit');if(party.every(h=>h.curHp<=0))wipe();}
function dropBossChest(){S.chests['chefe']=(S.chests['chefe']||0)+1;S.chests['dourado']=(S.chests['dourado']||0)+1;
  chestDropFx('🗝️');setTimeout(()=>chestDropFx('🎁'),200);
  log(`🗝️ <b>Baú de Chefe</b> + 🎁 Baú Dourado conquistados!`,'loot');if(active==='bau')renderPanel();}
function killEnemy(){deathFx(isBoss);const g=Math.floor(enemyReward()*goldMul());S.gold+=g;S.kills++;killsOnNode++;
  floatTxt(380,'+'+g+'🪙','#D4A24C');
  {const xpg=Math.round((2+Math.pow(diff(S.region,S.stage),2)*1.2)*(isBoss?10:1)*(1+RB.xp)*legadoMul()); // escala de XP por dificuldade
   S.deployed.forEach(k=>{const b=heroLevel(k);S.heroXp[k]=(S.heroXp[k]||0)+xpg;
     if(heroLevel(k)>b){log(`⭐ ${HEROES.find(h=>h.key===k).name} subiu pro Lv${heroLevel(k)}! (+1 ponto de skill)`,'sys');invalidateStats();}});}
  if(isBoss){
    const firstClear=!isCleared(S.region,S.stage);
    dropBossChest();banner('⚔ '+REGIONS[S.region].boss);
    if(firstClear){S.cleared[nodeKey(S.region,S.stage)]=true;
      log(`✨ <b>${REGIONS[S.region].boss}</b> derrotado! Fase ${S.region+1}-${S.stage} libertada.`,'sys');}
    if(S.region===REGIONS.length-1&&S.difficulty>=S.diffUnlocked&&S.diffUnlocked<3){S.diffUnlocked++;
      log(`🔥 Dificuldade <b>${DIFFS[S.diffUnlocked].n}</b> desbloqueada!`,'sys');}
    party.forEach(h=>h.curHp=effHp(h));enemy=null;updateTop();refreshAldeiaButtons();updateStageBar();
    // NARRATIVA: 1ª vez que o capítulo é fechado → dilema (pausa o jogo até a escolha)
    if(firstClear&&CHOICE_EVENTS[S.region]&&S.chapterChoices[S.region]===undefined){openChoiceEvent(S.region);return;}
    if(S.autoProg)advanceStage();else if(active==='portal')renderPanel();
    return;}
  dropLoot();
  party.forEach(h=>{if(h.curHp>0)h.curHp=Math.min(effHp(h),h.curHp+effHp(h)*0.15);});  // cura 15% por abate (sustenta no stage)
  if(killsOnNode>=STAGE_QUOTA&&!isCleared(S.region,S.stage)){
    S.cleared[nodeKey(S.region,S.stage)]=true;log(`Fase ${S.region+1}-${S.stage} concluída.`,'sys');banner('FASE '+(S.region+1)+'-'+S.stage+' CONCLUÍDA');loreTick();
    if(active==='portal')renderPanel();
    if(S.autoProg){enemy=null;updateTop();refreshAldeiaButtons();updateStageBar();advanceStage();return;}}
  if(waveQueue.length){enemy=waveQueue.shift();drawArena();}else enemy=null;
  updateTop();refreshAldeiaButtons();updateStageBar();}
function refreshAldeiaButtons(){if(active!=='aldeia')return;const aC=cost(25,S.atkLvl),gC=cost(40,S.goldLvl),hC=cost(30,S.hpLvl);
  const a=document.getElementById('bA'),g=document.getElementById('bG'),h=document.getElementById('bH');
  if(a)a.disabled=S.gold<aC;if(g)g.disabled=S.gold<gC;if(h)h.disabled=S.gold<hC;}
function wipe(){log('A aldeia recuou para se recuperar.','crit');party.forEach(h=>{h.curHp=effHp(h);h._rage=0;});killsOnNode=0;enemy=null;waveQueue=[];}
function selectNode(r,s){if(!isUnlocked(r,s))return;S.region=r;S.stage=s;killsOnNode=0;enemy=null;waveQueue=[];
  party.forEach(h=>h.curHp=effHp(h));log(`Marchando para <b>${REGIONS[r].name} ${r+1}-${s}</b>.`,'sys');updateTop();drawArena();renderPanel();save();}
function buy(kind,base,k){const c=cost(base,S[k]);if(S.gold<c)return;S.gold-=c;S[k]++;invalidateStats();log(`Poder evoluído: ${kind} → Nv.${S[k]}`,'sys');updateTop();renderPanel();save();}

function invPush(it){if(S.inv.length<INV_CAP){S.inv.push(it);return true;}it.tab=S.activeTab;S.stash.push(it);return false;}
function equip(itemId,hk){const i=S.inv.findIndex(x=>x.id===itemId);if(i<0)return;const it=S.inv[i];
  const g=S.gear[hk]||(S.gear[hk]={});const old=g[it.slot];
  g[it.slot]=it;S.inv.splice(i,1);if(old)invPush(old);
  selItem=null;log(`${HEROES.find(h=>h.key===hk).name} equipou ${it.nome} ${it.rarNome}.`,'sys');
  syncHp();updateTop();renderPanel();save();}
function unequip(hk,slot){const g=S.gear[hk];if(!g||!g[slot])return;const it=g[slot];g[slot]=null;
  if(!invPush(it))log('Inventário cheio — foi pro Baú.','crit');syncHp();updateTop();renderPanel();save();}
function findItem(id){let i=S.inv.findIndex(x=>x.id===id);if(i>=0)return{arr:S.inv,i};i=S.stash.findIndex(x=>x.id===id);if(i>=0)return{arr:S.stash,i};return null;}
function sellItem(id){const f=findItem(id);if(!f)return;const it=f.arr[f.i];S.gold+=it.val;f.arr.splice(f.i,1);
  selItem=null;log(`Vendido ${it.nome} ${it.rarNome} por ${it.val}🪙`,'gold');updateTop();renderPanel();save();}
function stashItem(id){const i=S.inv.findIndex(x=>x.id===id);if(i<0)return;const it=S.inv.splice(i,1)[0];it.tab=S.activeTab;S.stash.push(it);selItem=null;updateTop();renderPanel();save();}
function takeItem(id){if(S.inv.length>=INV_CAP){log('Inventário cheio!','crit');return;}const i=S.stash.findIndex(x=>x.id===id);if(i<0)return;S.inv.push(S.stash.splice(i,1)[0]);selItem=null;updateTop();renderPanel();save();}
function stashAll(){let n=0;while(S.inv.length){const it=S.inv.shift();it.tab=S.activeTab;S.stash.push(it);n++;}if(n)log(`Guardou ${n} itens no Baú.`,'sys');updateTop();renderPanel();save();}
function takeAll(){let n=0;for(const it of S.stash.filter(x=>x.tab===S.activeTab)){if(S.inv.length>=INV_CAP)break;S.stash.splice(S.stash.indexOf(it),1);S.inv.push(it);n++;}if(n)log(`Pegou ${n} itens do Baú.`,'sys');updateTop();renderPanel();save();}
function syncHp(){invalidateStats();party.forEach(h=>{if(h.curHp>effHp(h))h.curHp=effHp(h);});}

function log(t,cls){const l=document.getElementById('log');if(!l)return;const d=document.createElement('div');if(cls)d.className=cls;d.innerHTML=t;l.prepend(d);while(l.children.length>40)l.lastChild.remove();}
function updateTop(){document.getElementById('gold').textContent=Math.floor(S.gold).toLocaleString('pt-BR');
  document.getElementById('region').textContent=REGIONS[S.region].name;document.getElementById('stageLbl').textContent=(S.region+1)+'-'+S.stage;
  document.getElementById('kills').textContent=S.kills;document.getElementById('invc').textContent=S.inv.length;
  document.getElementById('invcap').textContent=INV_CAP;}
function renderBars(){party.forEach((h,i)=>{const el=document.querySelector('#h'+i+' .bar i');
    if(el){const m=effHp(h);el.style.width=Math.max(0,h.curHp/m*100)+'%';el.style.background=h.curHp>0?'var(--hp)':'#333';}});
  const eb=document.getElementById('eHp');if(eb&&enemy)eb.style.width=Math.max(0,enemy.hp/enemy.max*100)+'%';
  const en=document.getElementById('eName');if(en&&enemy)en.textContent=enemy.name+(waveQueue.length?` ·leva +${waveQueue.length}`:'');}

function applyChoice(o){S.posture=Math.max(-100,Math.min(100,S.posture+(o.dp||0)));
 S.uniao=Math.max(0,Math.min(100,S.uniao+(o.du||0)));if(o.gold){S.gold+=o.gold;updateTop();}}
function computeEnding(){const p=S.posture,u=S.uniao;
 if(u<35)return ENDINGS.fragmentacao;
 if(u>=80&&Math.abs(p)<=20)return ENDINGS.canonico;
 if(p<=-30)return ENDINGS.armada;
 if(p>=30)return ENDINGS.memoria;
 return ENDINGS.sincretismo;}
function closeOvl(){const o=document.getElementById('ovl');if(o)o.remove();narrativePause=false;}
function openChoiceEvent(r){const ev=CHOICE_EVENTS[r];if(!ev)return;
 S.chapterChoices[r]='pending';narrativePause=true;
 const o=document.createElement('div');o.id='ovl';o.className='ovl';
 o.innerHTML=`<div class="ovlbox"><div class="ovlsub">${ev.sub}</div><h2>${ev.title}</h2>
   <p class="ovltext">${ev.text}</p>
   <div class="ovlopts">${ev.options.map((op,i)=>`<button data-i="${i}"><b>${op.label}</b><small>${op.desc}${op.gold?' · +'+op.gold+'🪙':''}</small></button>`).join('')}</div></div>`;
 document.body.appendChild(o);
 o.querySelectorAll('.ovlopts button').forEach(b=>b.onclick=()=>{
   const op=ev.options[+b.dataset.i];applyChoice(op);S.chapterChoices[r]=op.label;

   else{if(S.autoProg)advanceStage();else if(active==='portal')renderPanel();}

// Prestígio "Gerações da Resistência": encerra a expedição por Legado permanente
function legadoGain(){return (S.region+1)*(1+(S.difficulty||0));}   // ganho por geração (escala com progresso/dificuldade · run-based)
function canPrestige(){return S.region>=1;}                          // libera após abrir o Cap II
function doPrestige(){if(!canPrestige())return;const g=legadoGain();
  if(!confirm(`Encerrar a Geração ${(S.geracao||0)+1}?\n\nA EXPEDIÇÃO reinicia (região, ouro, níveis dos heróis, gear, inventário, Cubo).\nVocê GANHA +${g} de Legado permanente → +${g*2}% em dano/ouro/XP pra sempre.\n\nPermanecem: Pets, Deuses, Runas, dificuldades e a Crônica (suas escolhas/finais).`))return;
  S.legado=(S.legado||0)+g; S.geracao=(S.geracao||0)+1;
  S.region=0;S.stage=1;S.cleared={};S.gold=0;killsOnNode=0;enemy=null;waveQueue=[];
  S.heroXp={};S.heroSkills={};S.heroAttrs={};HEROES.forEach(h=>S.gear[h.key]={});S.inv=[];S.stash=[];
  S.chests={};S.cubeLevel=1;S.cubeXp=0;S.atkLvl=0;S.goldLvl=0;S.hpLvl=0;S.gems={urucum:0,jade:0,quartzo:0};
  invalidateStats();party=buildParty();drawArena();updateTop();renderPanel();save();
  banner('✊ GERAÇÃO '+S.geracao);
  log(`✊ <b>Geração ${S.geracao}</b> tombou — mas deixou <b>+${g} de Legado</b>. A resistência recomeça mais forte (+${(S.legado*2)}% no total).`,'sys');}
function panelCronica(){const post=S.posture,u=S.uniao,postPct=(post+100)/2;
 const chosen=Object.keys(S.chapterChoices||{}).filter(k=>S.chapterChoices[k]&&S.chapterChoices[k]!=='pending');
 const endRows=Object.keys(ENDINGS).map(k=>{const e=ENDINGS[k];const got=S.ending===k;
   return `<div class="upg"><span>${e.emoji} ${e.t} ${e.best?'🏆':''}</span><small class="muted">${got?'✅ alcançado':'—'}</small></div>`;}).join('');

function panelStash(){

  let act='';const it=S.stash.find(x=>x.id===selItem);
  if(it){const sName=SLOTS.find(s=>s.k===it.slot).n;

  panel.innerHTML=`<h2>Baú — abas renomeáveis (duplo-clique) 🖐️</h2>
    <div class="stabs" id="stabs">${tabsHtml}<button id="addTab" style="padding:4px 8px">+ aba</button></div>
    <div class="row" style="display:flex;gap:6px;margin-bottom:8px"><button onclick="takeAll()">Pegar tudo</button><button onclick="stashAll()" style="background:#2d4a2f">Guardar tudo</button></div>
    <div class="invgrid">${cells}</div>${act}
    <p class="muted" style="margin-top:8px">Clique um item pra Pegar ou Vender. Arraste abas (⠿) pra reordenar · <b>duplo-clique</b> renomeia.</p>`;
  panel.querySelectorAll('.stab').forEach(el=>{
    el.addEventListener('click',()=>{S.activeTab=+el.dataset.id;selItem=null;renderPanel();save();});
    el.addEventListener('dblclick',()=>{const t=S.tabs.find(x=>x.id===+el.dataset.id);if(!t)return;
      const nn=prompt('Renomear aba:',t.name);if(nn&&nn.trim()){t.name=nn.trim();renderPanel();save();}});
    el.addEventListener('dragstart',()=>{dragTab=+el.dataset.i;el.classList.add('drag');});
    el.addEventListener('dragend',()=>{el.classList.remove('drag');panel.querySelectorAll('.stab').forEach(x=>x.classList.remove('over'));});

  panel.querySelectorAll('.slot[data-id]').forEach(el=>el.onclick=()=>{selItem=(selItem===+el.dataset.id?null:+el.dataset.id);renderPanel();});
  document.getElementById('addTab').onclick=()=>{const id=Math.max(0,...S.tabs.map(t=>t.id))+1;
    S.tabs.push({id,name:'Aba '+id});S.activeTab=id;renderPanel();save();};}

// ===== Pets & Deuses: efeito↔raridade · 1 de cada ativo · bônus global =====
const EFF_LBL={atk:'dano',hp:'vida',gold:'ouro',crit:'crítico',spd:'vel. ataque',loot:'loot'};
function effText(eff){return Object.entries(eff).map(([k,v])=>`+${Math.round(v*100)}% ${EFF_LBL[k]||k}`).join(' · ');}
// Ícone do pet/deus: tenta o sprite (gerado de madrugada) pela key; onerror cai no emoji.
function collIcon(o){return `<img src="arte/out/sprite/${o.key}_256.png" alt="" style="width:40px;height:40px;vertical-align:middle;object-fit:contain" onerror="this.outerHTML='${o.e}'">`;}
function acquire(kind,key){const list=kind==='pet'?PETS:DEUSES,owned=kind==='pet'?S.pets:S.deuses;
  const o=list.find(x=>x.key===key);if(!o||owned.includes(key))return;const c=RAR_COST[o.rar]||9999;
  if(S.gold<c)return;S.gold-=c;owned.push(key);
  log(`${kind==='pet'?'Cativou':'Invocou'} <b style="color:var(--c-${o.rar})">${o.e} ${o.name}</b>!`,'sys');
  updateTop();renderPanel();save();}
function activate(kind,key){const owned=kind==='pet'?S.pets:S.deuses;if(!owned.includes(key))return;
  if(kind==='pet')S.activePet=(S.activePet===key?null:key);else S.activeDeus=(S.activeDeus===key?null:key);
  recalcBon();syncHp();updateTop();drawArena();renderPanel();save();log('Bônus recalculado.','sys');}
function renderCollection(kind){const list=kind==='pet'?PETS:DEUSES,owned=kind==='pet'?S.pets:S.deuses;
  const activeKey=kind==='pet'?S.activePet:S.activeDeus,ord={comum:0,incomum:1,raro:2,lendario:3,encantado:4};
  const sorted=[...list].sort((a,b)=>ord[a.rar]-ord[b.rar]);
  return `<div class="cards">${sorted.map(o=>{const has=owned.includes(o.key),act=activeKey===o.key,c=RAR_COST[o.rar];
    const sub=kind==='pet'?(o.bioma||''):(o.dom||'');let btn;
    if(act)btn=`<button style="background:var(--ambar);color:#0A0A0A" onclick="activate('${kind}','${o.key}')">★ Ativo — desativar</button>`;
    else if(has)btn=`<button onclick="activate('${kind}','${o.key}')">Ativar</button>`;
    else btn=`<button ${S.gold<c?'disabled':''} onclick="acquire('${kind}','${o.key}')">${kind==='pet'?'Cativar':'Invocar'} 🪙${c.toLocaleString('pt-BR')}</button>`;
    return `<div class="card" style="${act?'border-color:var(--ambar)':''}">
      <h3>${collIcon(o)} <span style="color:var(--c-${o.rar})">${o.name}</span>${o.amea?' <small title="espécie ameaçada">🔴</small>':''} <span class="muted">${RAR_META(o.rar).nome}</span></h3>
      <p class="muted">${sub}</p><p><b>${effText(o.eff)}</b></p>
      ${o.orig?`<p class="muted" style="font-size:11px">${o.orig}</p>`:''}${btn}</div>`;}).join('')}</div>`;}

       ${rows}</div>`;}).join('')}</div>`;}
// ===== CUBO (8 funções) · v1: Síntese · Alquimia · Decoração (resto estruturado) =====
const RAR_NEXT=k=>{const i=RARITIES.findIndex(r=>r.k===k);return i>=0&&i<RARITIES.length-1?RARITIES[i+1]:null;};
function allItemsCount(){const c={};S.inv.concat(S.stash).forEach(it=>c[it.rar]=(c[it.rar]||0)+1);return c;}
function synthesize(rarK){const next=RAR_NEXT(rarK);if(!next)return;
  let pool=S.inv.concat(S.stash).filter(it=>it.rar===rarK);
  if(pool.length<9){log(`Precisa de 9 ${RAR_META(rarK).nome} (tem ${pool.length}).`,'crit');return;}
  pool.sort((a,b)=>(a.pw||0)-(b.pw||0));const use=pool.slice(0,9).map(x=>x.id);
  S.inv=S.inv.filter(it=>!use.includes(it.id));S.stash=S.stash.filter(it=>!use.includes(it.id));
  let outRar=next;if(Math.random()<(0.15+((S.cubeLevel||1)-1)*0.003)){const n2=RAR_NEXT(next.k);if(n2)outRar=n2;}
  const it=makeItem(outRar);invPush(it);
  log(`🔮 Síntese: 9 ${RAR_META(rarK).nome} → <b style="color:var(--c-${outRar.k})">${it.nome} ${outRar.nome}</b>!`,'loot');
  cubeGainXp(15+Math.max(0,RARITIES.findIndex(r=>r.k===rarK))*8);invalidateStats();updateTop();renderPanel();save();}
function alchemy(rarK){const pool=S.inv.concat(S.stash).filter(it=>it.rar===rarK);if(!pool.length)return;
  let g=0;pool.forEach(it=>g+=it.val);S.inv=S.inv.filter(it=>it.rar!==rarK);S.stash=S.stash.filter(it=>it.rar!==rarK);
  S.gold+=g;cubeGainXp(Math.min(40,pool.length*2));log(`⚗️ Alquimia: ${pool.length} ${RAR_META(rarK).nome} → ${g.toLocaleString('pt-BR')}🪙`,'gold');updateTop();renderPanel();save();}
function decorate(id){const f=findItem(id);if(!f)return;const it=f.arr[f.i];const ri=RARITIES.findIndex(r=>r.k===it.rar);
  if(ri<2){log('Decoração exige item Raro+.','crit');return;}if((it.mods||[]).length>=8){log('Item já está cheio de mods.','crit');return;}
  const cost=Math.floor(200*Math.pow(2,ri));if(S.gold<cost){log('Ouro insuficiente.','crit');return;}
  S.gold-=cost;const sl=SLOTS.find(s=>s.k===it.slot)||{stat:'atk'};
  it.mods.push(rollMod(sl.stat,RAR_META(it.rar),it.lvl||1));it.pw=itemPower(it.mods);
  cubeGainXp(8+ri*4);log(`💎 Decoração: +1 mod em <b style="color:var(--c-${it.rar})">${it.nome}</b>.`,'sys');invalidateStats();updateTop();renderPanel();save();}
function panelCube(){const mode=S.cubeMode||'synthesis',counts=allItemsCount();
  const tabs=[['synthesis','🔮 Síntese'],['alchemy','⚗️ Alquimia'],['decoration','💎 Decoração'],['gemas','💠 Lapidação'],['outras','🔒 Outras']];
  let body='';
  if(mode==='synthesis')body=`<p class="muted" style="font-size:11px">9 itens da MESMA raridade → 1 do tier acima (15% de pular +1). Consome os de menor ⚡ (inventário + baú).</p>`+
    RARITIES.slice(0,9).map(r=>{const n=counts[r.k]||0,can=n>=9&&RAR_NEXT(r.k);
      return `<div class="upg"><span style="color:var(--c-${r.k})">${r.nome} <small class="muted">(${n})</small></span><button ${can?'':'disabled'} onclick="synthesize('${r.k}')">Sintetizar 9 →</button></div>`;}).join('');
  else if(mode==='alchemy')body=`<p class="muted" style="font-size:11px">Converte TODO o lixo de uma raridade em ouro (inv + baú). Irreversível.</p>`+
    ['comum','incomum','raro'].map(k=>{const r=RAR_META(k),n=counts[k]||0;
      return `<div class="upg"><span style="color:var(--c-${k})">${r.nome} <small class="muted">(${n})</small></span><button ${n?'':'disabled'} onclick="if(confirm('Transmutar ${n} ${r.nome} em ouro?'))alchemy('${k}')">→ 🪙</button></div>`;}).join('');
  else if(mode==='decoration'){const items=S.inv.filter(it=>RARITIES.findIndex(r=>r.k===it.rar)>=2);
    body=`<p class="muted" style="font-size:11px">+1 mod aleatório num item Raro+ do inventário (custo escala com raridade).</p>`+
     (items.length?items.map(it=>{const ri=RARITIES.findIndex(r=>r.k===it.rar),cost=Math.floor(200*Math.pow(2,ri));
       return `<div class="upg"><span style="color:var(--c-${it.rar})">${it.e} ${it.nome} ${it.rarNome} <small class="muted">⚡${it.pw}·${(it.mods||[]).length}mods</small></span><button ${S.gold>=cost?'':'disabled'} onclick="decorate(${it.id})">+mod 🪙${cost}</button></div>`;}).join(''):'<p class="muted">Sem itens Raro+ no inventário (Pegue do Baú primeiro).</p>');}
  else if(mode==='gemas')body=`<p class="muted" style="font-size:11px">Lapide ouro em gemas e crave nos soquetes dos itens (no Inventário/Baú). Mais raridade = mais soquetes (Comum 0 → Encantado 5 → Primordial 7).</p>`+
    `<div class="upg"><span>💠 Lapidar — 1 gema aleatória <small class="muted">(custo cai com o Nível do Cubo)</small></span><button ${S.gold>=lapidarCost()?'':'disabled'} onclick="cubeGem()">🪙 ${lapidarCost()}</button></div>`+
    GEMS.map(g=>`<div class="upg"><span>${g.e} ${g.n} <small class="muted">${g.desc}</small></span><small class="muted">×${S.gems[g.k]||0}</small></div>`).join('');
  else body=`<p class="muted">⚙️ Engraving · Inscription · Removal · Crafting (joias) · Offering — entram nas próximas iterações.</p>`;
  const cl=S.cubeLevel||1,cx=S.cubeXp||0,cn=cubeNeed(),cpct=cl<100?Math.round(cx/cn*100):100;
  panel.innerHTML=`<h2>Cubo — funções</h2>
   <p class="muted" style="font-size:11px">🔮 Cubo <b style="color:var(--ambar)">Nv ${cl}</b> ${cl<100?`· XP ${cx}/${cn}`:'· MÁX'} <span style="display:inline-block;width:90px;height:6px;background:#0006;border-radius:3px;vertical-align:middle;overflow:hidden"><i style="display:block;height:100%;width:${cpct}%;background:var(--c-raro)"></i></span> — usar o Cubo sobe o nível (síntese melhora · lapidação barateia).</p>
   <div class="regtabs">${tabs.map(([k,n])=>`<button class="${mode===k?'sel':''}" onclick="S.cubeMode='${k}';renderPanel()">${n}</button>`).join('')}</div>${body}`;}
function panelRunas(){
  panel.innerHTML=`<h2>Runas — buffs globais permanentes</h2>
   <p class="muted" style="font-size:11px">Compradas com ouro · efeito permanente em todos os heróis e ganhos. Custo sobe a cada nível.</p>
   ${RUNES.map(r=>{const l=S.runes[r.k]||0,c=runeCost(r),maxed=l>=r.max;
     return `<div class="upg"><span>${r.e} ${r.n} <small class="muted">Nv.${l}/${r.max} · ${r.d}</small></span>
       <button ${(!maxed&&S.gold>=c)?'':'disabled'} onclick="buyRune('${r.k}')">${maxed?'MÁX':'🪙 '+c.toLocaleString('pt-BR')}</button></div>`;}).join('')}`;}
function panelMercado(){const porRar={};S.inv.forEach(it=>porRar[it.rarNome]=(porRar[it.rarNome]||0)+1);
  panel.innerHTML=`<h2>Mercado — economia de itens (em construção)</h2>
   <p class="muted">Objetivo do produto: um <b>mercado de itens entre jogadores</b> onde raridades altas têm valor. Aqui fica a base.</p>
   <div style="margin:10px 0">${RARITIES.map(r=>`<div class="upg"><span style="color:var(--c-${r.k})">${r.nome}</span><span>${porRar[r.nome]||0} no baú · ~${r.val}🪙</span></div>`).join('')}</div>
   <p class="muted">⚖️ <b>Compliance:</b> mercado com valor real exige cuidado jurídico (loot box, pagamentos, tributação, CDC, LGPD, menores). Começar com moeda interna.</p>`;}

function offline(){const dt=Math.min((Date.now()-(S.lastSeen||Date.now()))/1000,(24+RB.offlineH)*3600);const rate=(3+diff(S.region,S.stage)*1.4)*goldMul()*1.5;
  if(dt>30){const g=Math.floor(rate*dt);S.gold+=g;log(`🌙 De volta! A resistência rendeu <span class="gold">${g.toLocaleString('pt-BR')}🪙</span> em ${Math.floor(dt/60)} min.`,'sys');}}

recalcRB();recalcBon();offline();updateTop();drawArena();renderPanel();updateProgBtn();
document.getElementById('progBtn').onclick=()=>{S.autoProg=!S.autoProg;updateProgBtn();save();
  log(S.autoProg?'▶ Progressão automática LIGADA.':'🔒 Travado pra farmar este stage.','sys');
  if(S.autoProg&&isCleared(S.region,S.stage)&&!isBossStage(S.stage))advanceStage();};
log('Os guerreiros despertam na <b>Mata Atlântica</b>. A colonização avança — defenda a terra.','sys');
setInterval(()=>{save();refreshAldeiaButtons();},3000);
requestAnimationFrame(tick);
</script>
